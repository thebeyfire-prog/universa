<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Universa box logo token image</title>
  <desc id="desc">A simple lowercase universa wordmark in an off-white streetwear-style rectangle on a black token image.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="17"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050507"/>
      <stop offset="0.58" stop-color="#080813"/>
      <stop offset="1" stop-color="#020203"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f0e4"/>
      <stop offset="1" stop-color="#d8d1c3"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" filter="url(#grain)" opacity="0.75"/>
  <circle cx="512" cy="512" r="424" fill="none" stroke="#f6f0e4" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="512" cy="512" r="340" fill="none" stroke="#8bd8ff" stroke-opacity="0.08" stroke-width="2"/>
  <g transform="translate(96 386)">
    <rect x="0" y="0" width="832" height="252" rx="18" fill="url(#box)"/>
    <rect x="0" y="0" width="832" height="252" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.22"/>
    <text
      x="416"
      y="158"
      text-anchor="middle"
      dominant-baseline="middle"
      fill="#050507"
      font-family="Arial Black, Helvetica Neue, Helvetica, sans-serif"
      font-size="142"
      font-style="italic"
      font-weight="900"
      letter-spacing="-10"
      textLength="690"
      lengthAdjust="spacingAndGlyphs">universa</text>
  </g>
  <text
    x="512"
    y="720"
    text-anchor="middle"
    fill="#f6f0e4"
    fill-opacity="0.36"
    font-family="Arial, Helvetica, sans-serif"
    font-size="22"
    font-weight="800"
    letter-spacing="9">UNV</text>
</svg>
