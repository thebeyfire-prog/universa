<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="1672" viewBox="0 0 1672 1672" role="img" aria-labelledby="title desc">
  <title id="title">Universa compliant payment rails</title>
  <desc id="desc">Simple off-white Universa style image with exact text: compliant payment rails.</desc>
  <defs>
    <filter id="paper" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.58" numOctaves="3" seed="41"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.045"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1672" height="1672" fill="#f7f1e7"/>
  <rect width="1672" height="1672" filter="url(#paper)" opacity="0.7"/>
  <g transform="translate(0 0)">
    <text
      x="836"
      y="866"
      text-anchor="middle"
      dominant-baseline="middle"
      fill="#050507"
      font-family="Arial Black, Helvetica Neue, Helvetica, sans-serif"
      font-size="86"
      font-style="italic"
      font-weight="900"
      letter-spacing="-4"
      textLength="1220"
      lengthAdjust="spacingAndGlyphs">{compliant payment rails}</text>
  </g>
</svg>
