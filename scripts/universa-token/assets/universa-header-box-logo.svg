<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="1672" viewBox="0 0 1672 1672" role="img" aria-labelledby="title desc">
  <title id="title">Universa box logo header</title>
  <desc id="desc">A dark wide header with a simple universa box wordmark and minimal money-rail linework.</desc>
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" seed="29"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.07"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050507"/>
      <stop offset="0.54" stop-color="#090913"/>
      <stop offset="1" stop-color="#020203"/>
    </linearGradient>
    <radialGradient id="glow" cx="68%" cy="42%" r="48%">
      <stop offset="0" stop-color="#8bd8ff" stop-opacity="0.22"/>
      <stop offset="0.35" stop-color="#7e5cff" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="box" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f0e4"/>
      <stop offset="1" stop-color="#d8d1c3"/>
    </linearGradient>
  </defs>
  <rect width="1672" height="1672" fill="url(#bg)"/>
  <rect width="1672" height="1672" fill="url(#glow)"/>
  <rect width="1672" height="1672" filter="url(#grain)" opacity="0.9"/>
  <g opacity="0.34" fill="none" stroke-linecap="round">
    <path d="M985 574 C1184 550 1346 632 1487 804" stroke="#8bd8ff" stroke-width="2"/>
    <path d="M962 1084 C1110 952 1278 886 1510 894" stroke="#f6f0e4" stroke-width="1.4" opacity="0.5"/>
    <path d="M1030 664 L1512 664" stroke="#f6f0e4" stroke-width="1" opacity="0.25"/>
    <path d="M1030 1006 L1512 1006" stroke="#f6f0e4" stroke-width="1" opacity="0.16"/>
    <circle cx="1232" cy="664" r="8" fill="#8bd8ff" stroke="none" opacity="0.8"/>
    <circle cx="1432" cy="894" r="6" fill="#f6f0e4" stroke="none" opacity="0.55"/>
    <circle cx="1094" cy="1008" r="5" fill="#8bd8ff" stroke="none" opacity="0.6"/>
  </g>
  <g transform="translate(132 714)">
    <rect x="0" y="0" width="850" height="246" rx="18" fill="url(#box)"/>
    <rect x="0" y="0" width="850" height="246" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.22"/>
    <text
      x="425"
      y="154"
      text-anchor="middle"
      dominant-baseline="middle"
      fill="#050507"
      font-family="Arial Black, Helvetica Neue, Helvetica, sans-serif"
      font-size="144"
      font-style="italic"
      font-weight="900"
      letter-spacing="-10"
      textLength="705"
      lengthAdjust="spacingAndGlyphs">universa</text>
  </g>
  <text x="138" y="1008" fill="#f6f0e4" fill-opacity="0.6" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" letter-spacing="0.01em">stablecoin rails for serious builders</text>
  <text x="138" y="1050" fill="#8bd8ff" fill-opacity="0.72" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" letter-spacing="0.18em">KYC · VIRTUAL ACCOUNTS · QUOTES · TRANSFERS</text>
</svg>
