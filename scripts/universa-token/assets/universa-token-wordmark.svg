<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Universa token wordmark</title>
  <desc id="desc">Lowercase universa wordmark with galaxy gradient text on a white background.</desc>
  <defs>
    <radialGradient id="galaxy-a" cx="26%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#d8fbff"/>
      <stop offset="18%" stop-color="#8bdcff"/>
      <stop offset="42%" stop-color="#5b7cff"/>
      <stop offset="66%" stop-color="#7846ff"/>
      <stop offset="100%" stop-color="#07140f"/>
    </radialGradient>
    <linearGradient id="galaxy-b" x1="14%" y1="16%" x2="92%" y2="84%">
      <stop offset="0%" stop-color="#07140f"/>
      <stop offset="28%" stop-color="#163b73"/>
      <stop offset="54%" stop-color="#6c4dff"/>
      <stop offset="78%" stop-color="#63d7ff"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <filter id="soft-glow" x="-20%" y="-35%" width="140%" height="170%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.21 0 0 0 0 0.44 0 0 0 0 0.95 0 0 0 .45 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="word-clip">
      <text
        x="512"
        y="548"
        text-anchor="middle"
        font-family="Archivo Black, Arial Black, Inter, Helvetica, Arial, sans-serif"
        font-size="150"
        font-weight="900"
        letter-spacing="-13"
      >universa</text>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" rx="228" fill="#ffffff"/>
  <circle cx="512" cy="512" r="394" fill="#f6fbff"/>
  <circle cx="512" cy="512" r="392" fill="none" stroke="#e2edf6" stroke-width="2"/>

  <g clip-path="url(#word-clip)" filter="url(#soft-glow)">
    <rect x="142" y="365" width="740" height="250" fill="url(#galaxy-a)"/>
    <rect x="142" y="365" width="740" height="250" fill="url(#galaxy-b)" opacity="0.58"/>
    <circle cx="270" cy="426" r="76" fill="#9be8ff" opacity="0.42"/>
    <circle cx="574" cy="485" r="112" fill="#805cff" opacity="0.46"/>
    <circle cx="741" cy="435" r="66" fill="#ffffff" opacity="0.42"/>
    <path d="M154 560 C286 444 384 516 498 438 C610 362 698 424 870 370 L870 626 L154 626 Z" fill="#07140f" opacity="0.34"/>
    <g fill="#ffffff">
      <circle cx="231" cy="426" r="4.2"/>
      <circle cx="315" cy="512" r="2.9"/>
      <circle cx="421" cy="443" r="3.4"/>
      <circle cx="506" cy="397" r="2.6"/>
      <circle cx="589" cy="552" r="3.6"/>
      <circle cx="686" cy="454" r="2.8"/>
      <circle cx="781" cy="519" r="4.4"/>
      <circle cx="828" cy="415" r="2.5"/>
    </g>
  </g>

  <text
    x="512"
    y="548"
    text-anchor="middle"
    font-family="Archivo Black, Arial Black, Inter, Helvetica, Arial, sans-serif"
    font-size="150"
    font-weight="900"
    letter-spacing="-13"
    fill="none"
    stroke="#07140f"
    stroke-opacity="0.08"
    stroke-width="2"
  >universa</text>
</svg>
