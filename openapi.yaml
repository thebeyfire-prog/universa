openapi: 3.1.0
info:
  title: Universa API
  version: 0.1.0
  description: Tenant-scoped API for KYC-gated fiat and stablecoin money movement.
servers:
  - url: https://pvuoslgpooqdvedynjok.supabase.co/functions/v1/platform-api
    description: Development sandbox
security:
  - UniversaKey: []
    UniversaTimestamp: []
    UniversaNonce: []
    UniversaSignature: []
paths:
  /v1/customers:
    post:
      summary: Create a customer
      operationId: createCustomer
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomer"
      responses:
        "201":
          description: Customer created
  /v1/customers/{customerId}:
    get:
      summary: Get a customer
      operationId: getCustomer
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      responses:
        "200":
          description: Customer returned
  /v1/customers/{customerId}/kyc-sessions:
    post:
      summary: Create a hosted KYC session
      operationId: createKycSession
      parameters:
        - $ref: "#/components/parameters/CustomerId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "201":
          description: KYC session created
  /v1/customers/{customerId}/wallet:
    get:
      summary: Get the assigned customer wallet
      description: Returns the Privy-managed Solana wallet assigned after the customer reaches active KYC.
      operationId: getCustomerWallet
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      responses:
        "200":
          description: Customer wallet returned
  /v1/customers/{customerId}/wallet/export:
    post:
      summary: Export the assigned customer wallet through Privy HPKE
      description: Brokers a Privy wallet export. The plaintext key is encrypted to the supplied HPKE recipient public key and is never stored by Universa.
      operationId: exportCustomerWallet
      parameters:
        - $ref: "#/components/parameters/CustomerId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipient_public_key]
              properties:
                recipient_public_key:
                  type: string
                  description: HPKE recipient public key generated by the caller.
      responses:
        "200":
          description: HPKE-encrypted wallet export returned
  /v1/customers/{customerId}/virtual-accounts:
    get:
      summary: List customer virtual accounts
      operationId: listVirtualAccounts
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      responses:
        "200":
          description: Virtual accounts returned
    post:
      summary: Create a virtual account
      operationId: createVirtualAccount
      parameters:
        - $ref: "#/components/parameters/CustomerId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_currency]
              properties:
                source_currency:
                  type: string
                  example: usd
                destination:
                  description: Optional. Defaults to the customer's assigned Solana USDC wallet.
                  $ref: "#/components/schemas/Route"
      responses:
        "201":
          description: Virtual account created
  /v1/quotes:
    post:
      summary: Create a fee-inclusive route quote
      operationId: createQuote
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, kind, amount, source, destination]
              properties:
                customer_id:
                  type: string
                kind:
                  type: string
                  enum: [onramp, offramp]
                amount:
                  type: string
                  pattern: '^\d+(\.\d{1,2})?$'
                tenant_fee_bps:
                  type: integer
                  minimum: 0
                  maximum: 300
                  default: 0
                  description: Optional tenant markup in basis points, added on top of the Universa base fee.
                source:
                  $ref: "#/components/schemas/Route"
                destination:
                  $ref: "#/components/schemas/Route"
      responses:
        "201":
          description: Quote created
  /v1/transfers:
    post:
      summary: Execute a quoted transfer
      operationId: createTransfer
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quote_id, source, destination]
              properties:
                quote_id:
                  type: string
                external_id:
                  type: string
                source:
                  $ref: "#/components/schemas/Route"
                destination:
                  $ref: "#/components/schemas/Route"
      responses:
        "201":
          description: Transfer created
  /v1/transfers/{transferId}:
    get:
      summary: Get a transfer
      operationId: getTransfer
      parameters:
        - name: transferId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transfer returned
webhooks:
  universaEvent:
    post:
      summary: Receive a Universa webhook event
      description: Universa sends this request to dashboard-configured tenant webhook endpoints.
      operationId: receiveUniversaWebhook
      parameters:
        - name: x-universa-delivery-id
          in: header
          required: true
          schema:
            type: string
        - name: x-universa-event-id
          in: header
          required: true
          schema:
            type: string
        - name: x-universa-event-type
          in: header
          required: true
          schema:
            type: string
        - name: x-universa-timestamp
          in: header
          required: true
          schema:
            type: string
          description: Unix timestamp in seconds. Signatures cover timestamp + "." + raw JSON body.
        - name: x-universa-signature
          in: header
          required: true
          schema:
            type: string
            pattern: '^v1=[0-9a-f]+$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookEvent"
      responses:
        "200":
          description: Any 2xx response marks the delivery as delivered.
components:
  securitySchemes:
    UniversaKey:
      type: apiKey
      in: header
      name: X-Universa-Api-Key
    UniversaTimestamp:
      type: apiKey
      in: header
      name: X-Universa-Timestamp
    UniversaNonce:
      type: apiKey
      in: header
      name: X-Universa-Nonce
    UniversaSignature:
      type: apiKey
      in: header
      name: X-Universa-Signature
  parameters:
    CustomerId:
      name: customerId
      in: path
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        maxLength: 200
  schemas:
    CreateCustomer:
      type: object
      required: [external_id, type, full_name, email, country_code]
      properties:
        external_id:
          type: string
        type:
          type: string
          enum: [individual, business]
        full_name:
          type: string
        email:
          type: string
          format: email
        country_code:
          type: string
          pattern: '^[A-Z]{2}$'
        metadata:
          type: object
          additionalProperties: true
    Route:
      type: object
      required: [currency, payment_rail]
      properties:
        currency:
          type: string
        payment_rail:
          type: string
        address:
          type: string
          description: Required only for non-default routes. Solana USDC legs default to the assigned customer wallet.
      additionalProperties: true
    CustomerWallet:
      type: object
      required: [id, customer_id, provider, provider_wallet_id, chain, address, custody_model, status, assigned_at]
      properties:
        id:
          type: string
        customer_id:
          type: string
        provider:
          type: string
          enum: [privy]
        provider_wallet_id:
          type: string
        chain:
          type: string
          enum: [solana]
        address:
          type: string
        custody_model:
          type: string
          enum: [privy_server_wallet]
        status:
          type: string
          enum: [active, held, revoked]
        assigned_at:
          type: string
          format: date-time
        exported_at:
          type:
            - string
            - "null"
          format: date-time
    WalletExport:
      type: object
      required: [provider, encryption_type, encapsulated_key, ciphertext]
      properties:
        provider:
          type: string
          enum: [privy]
        encryption_type:
          type: string
          enum: [HPKE]
        encapsulated_key:
          type:
            - string
            - "null"
        ciphertext:
          type:
            - string
            - "null"
    WebhookEvent:
      type: object
      required: [id, type, created_at, livemode, tenant_id, data]
      properties:
        id:
          type: string
          example: evt_abc123
        type:
          type: string
          enum:
            - customer.created
            - customer.status_changed
            - customer_wallet.created
            - customer_wallet.status_changed
            - kyc_session.created
            - kyc_session.status_changed
            - virtual_account.created
            - virtual_account.status_changed
            - quote.created
            - quote.status_changed
            - transfer.created
            - transfer.status_changed
            - ledger_transaction.created
            - ledger_transaction.status_changed
            - webhook.test
        created_at:
          type: string
          format: date-time
        livemode:
          type: boolean
        tenant_id:
          type: string
        data:
          type: object
          required: [object]
          properties:
            object:
              $ref: "#/components/schemas/WebhookResourceSnapshot"
    WebhookResourceSnapshot:
      type: object
      required: [resource_type, resource_id, status]
      properties:
        resource_type:
          type: string
          enum: [customer, customer_wallet, kyc_session, virtual_account, quote, transfer, ledger_transaction, webhook_test]
        resource_id:
          type: string
        previous_status:
          type:
            - string
            - "null"
        status:
          type: string
        source:
          type: string
        provider:
          type:
            - string
            - "null"
        provider_resource_id:
          type:
            - string
            - "null"
        request_id:
          type: string
        idempotency_key:
          type:
            - string
            - "null"
        details:
          type: object
          additionalProperties: true
