      <path d="M864 116 V244"/>
      <circle cx="700" cy="180" r="11" fill="#000"/>
      <circle cx="700" cy="180" r="11"/>
      <circle cx="864" cy="116" r="11" fill="#000"/>
      <circle cx="864" cy="116" r="11"/>
      <circle cx="864" cy="244" r="11" fill="#000"/>
      <circle cx="864" cy="244" r="11"/>
      <circle cx="1020" cy="180" r="11" fill="#000"/>
