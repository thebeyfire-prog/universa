    <path d="M0 72 H1180" stroke="#fff" stroke-width="1" opacity="0.32"/>
    <g fill="#fff" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" letter-spacing="4">
      <text x="34" y="47" font-size="18" opacity="0.68">FUNCTION RECEIPT</text>
