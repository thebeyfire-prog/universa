    <text x="114" y="190" font-size="18" opacity="0.58">SELF SERVE PAYOUT INFRA</text>
    <text x="1180" y="148" font-size="25">STATUS</text>
    <text x="1180" y="190" font-size="18" opacity="0.58">CREATE_VA SUCCESS</text>
  </g>

  <g filter="url(#soft-ink)">
