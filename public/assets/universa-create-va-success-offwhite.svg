    <text x="114" y="1364" font-size="21" letter-spacing="5" opacity="0.62">OWN INFRA. PROVIDER RAILS. USDC SETTLEMENT.</text>
    <text x="114" y="1460" font-size="18" letter-spacing="4" opacity="0.52">RUN ID: 06.15 / PAYOUTS ACTIVE / DEVS PAID ON-CHAIN</text>
