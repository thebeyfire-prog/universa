<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600" role="img" aria-labelledby="title desc">
  <title id="title">Universa create VA success preview</title>
  <desc id="desc">Black and white Universa infrastructure preview showing create VA function success.</desc>
  <defs>
    <filter id="soft-ink" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.45" result="blur"/>
      <feOffset dx="0" dy="0" result="offset"/>
      <feMerge>
        <feMergeNode in="offset"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="paper-grain" width="180" height="180" patternUnits="userSpaceOnUse">
      <rect width="180" height="180" fill="#000"/>
      <circle cx="16" cy="28" r="1.1" fill="#fff" opacity="0.06"/>
      <circle cx="82" cy="61" r="0.8" fill="#fff" opacity="0.045"/>
      <circle cx="137" cy="22" r="1.4" fill="#fff" opacity="0.035"/>
      <circle cx="122" cy="118" r="1" fill="#fff" opacity="0.05"/>
      <circle cx="41" cy="151" r="0.7" fill="#fff" opacity="0.04"/>
      <path d="M8 94 H172" stroke="#fff" stroke-width="0.45" opacity="0.018"/>
      <path d="M57 0 V180" stroke="#fff" stroke-width="0.45" opacity="0.014"/>
    </pattern>
  </defs>

  <rect width="1600" height="1600" fill="#000"/>
  <rect width="1600" height="1600" fill="url(#paper-grain)" opacity="0.72"/>

  <g fill="none" stroke="#fff" stroke-opacity="0.14">
    <rect x="66" y="66" width="1468" height="1468" stroke-width="2"/>
    <rect x="96" y="96" width="1408" height="1408" stroke-width="1"/>
    <path d="M96 310 H1504"/>
    <path d="M96 1232 H1504"/>
    <path d="M1146 96 V310"/>
    <path d="M454 1232 V1504"/>
